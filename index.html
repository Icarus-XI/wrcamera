<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>W&R Camera</title>
    
    <!-- Mobile PWA Core Mappings -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>W&R Camera</h1>
    <div class="scanner-form">
        <!-- Rigid dimensions container required by iOS WebKit engine to render video -->
        <div id="camera-feed" style="width: 100%; max-width: 500px; height: 380px; background: #222; margin: 0 auto; border-radius: 6px;"></div>
        
        <button id="take-picture-btn">Take Picture</button>
        <button id="redo-button">Redo</button>
        
        <label for="pro-number">Pro Number:</label>
        <input type="number" id="pro-number" pattern="\d{9}" required>
        
        <label for="length">Length (inches):</label>
        <input type="number" id="length" step="0.01" required>
        
        <label for="width">Width (inches):</label>
        <input type="number" id="width" step="0.01" required>
        
        <label for="height">Height (inches):</label>
        <input type="number" id="height" step="0.01" required>
        
        <button id="upload-button" disabled>Save Image to Device</button>
    </div>
    
    <img id="taken-image" src="" alt="Taken Image">

    <!-- External Script Engine Integrations -->
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>
    <script src="script.js"></script>
</body>
</html>
